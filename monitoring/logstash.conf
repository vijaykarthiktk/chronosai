input {
  # Accept syslog formats from beats agents running on EKS nodes
  beats {
    port => 5044
  }
  
  # Allow direct TCP ingestion for microservices
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [component] == "analytics" {
    mutate {
      add_tag => [ "economic-intelligence" ]
    }
  }
  
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "chronosai-logs-%{+YYYY.MM.dd}"
  }
  
  # Debug stdout printing inside logstash container logs
  stdout {
    codec => rubydebug
  }
}
