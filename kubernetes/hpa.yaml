apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chronosai-hpa
  namespace: chronosai
  labels:
    app: chronosai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chronosai-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
