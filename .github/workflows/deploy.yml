name: ChronosAI CI/CD - ECS Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

env:
  AWS_REGION: "us-east-2"
  ECS_CLUSTER_NAME: "chronosai-ecs-cluster"
  ECS_SERVICE_NAME: "chronosai-service"

permissions:
  contents: read
  packages: write

jobs:

  # Job 1: Build App Image & Push to GHCR (Runs first to ensure the image exists)
  build-and-push:
    name: Build & Push Container to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Tag, and Push Docker Image to GHCR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Lowercase the repository owner to satisfy docker image tag requirements
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$OWNER_LC/chronosai-analytics"
          
          # Build production docker image
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
          
          # Push image tags to GHCR
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  # Job 2: Infrastructure Provisioning & ECS Deployment
  ecs-deploy:
    name: Provision & Deploy to ECS Fargate
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Provision Infrastructure via Terraform
        run: |
          cd terraform
          terraform init
          
          # Build dynamic image tag matching this build's GHCR container
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$OWNER_LC/chronosai-analytics"
          
          # Run terraform apply passing the built image as an input parameter
          terraform apply -var="container_image=$IMAGE_NAME:${{ github.sha }}" -auto-approve

      - name: Force ECS Service Redeployment
        run: |
          # Trigger service update to pull the new container image immediately
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Verify Service Rollout Status
        run: |
          echo "=== Monitoring ECS Rollout Status ==="
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --services ${{ env.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }}
          
          echo "=== Active ECS Task Health ==="
          aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          
          cd terraform
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "=== DEPLOYMENT SUCCESSFUL ==="
          echo "Your ChronosAI app is publicly accessible at: http://$ALB_DNS"
